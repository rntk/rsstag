<html>

<head>
    <title>Group by category</title>
    {% include "head-data.html" %}
</head>

<body class="font-body selection:bg-secondary-container bg-background">
    {% from 'site-header.html' import site_header with context %}{% from
    'context-filter-bar.html' import context_filter_bar with context %}

    {{ site_header(active='categories') }}

    <div class="flex items-center px-10 py-2 max-w-[1600px] mx-auto">
        <div id="delete_controls" class="hidden items-center space-x-2">
            <button class="px-4 py-2 bg-surface-container-high hover:bg-surface-container-highest rounded-lg text-xs font-bold transition-colors" onclick="toggleSelectAll()">Select All</button>
            <button id="delete_btn" class="px-4 py-2 bg-error text-on-error rounded-lg text-xs font-bold transition-all active:scale-95 disabled:opacity-50 disabled:scale-100" onclick="confirmDelete()" disabled>
                Delete Selected (<span id="selected_count">0</span>)
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="min-h-screen">
        <div class="max-w-[1600px] mx-auto">

            <!-- Filter Bar -->
            <div class="sticky top-20 z-30 bg-surface/50 backdrop-blur-md px-10 py-2 border-b border-outline-variant/5">
                {{ context_filter_bar() }}
            </div>

            <!-- Content -->
            <div class="p-10">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center space-x-4">
                        <h2 class="text-3xl font-headline font-extrabold text-primary">Categories</h2>
                        <a href="{{group_by_link}}" class="text-xs font-bold text-on-surface-variant hover:text-primary bg-surface-container-high px-3 py-1.5 transition-all flex items-center space-x-1.5">
                            <span class="material-symbols-outlined text-sm">sell</span>
                            <span>Switch to Tags</span>
                        </a>
                    </div>
                </div>
                <div id="cats_list" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <div id="progressbar" class="fixed bottom-0 left-0 h-1 bg-primary transition-all duration-300"></div>
    <script type="text/javascript">
        var initial_cats_list = {{ data| json}};

        function toggleSelectAll() {
            var cbs = document.querySelectorAll('.category-checkbox, .feed-checkbox');
            var anyUnchecked = false;
            for (var i = 0; i < cbs.length; i++) {
                if (!cbs[i].checked) {
                    anyUnchecked = true;
                    break;
                }
            }
            for (var j = 0; j < cbs.length; j++) {
                cbs[j].checked = anyUnchecked;
            }
            updateDeleteButton();
        }

        function handleCheckboxChange() {
            updateDeleteButton();
        }

        function updateDeleteButton() {
            var selected = document.querySelectorAll('.category-checkbox:checked, .feed-checkbox:checked');
            var btn = document.getElementById('delete_btn');
            var count = document.getElementById('selected_count');
            var controls = document.getElementById('delete_controls');

            if (count) count.innerText = selected.length;
            if (btn) btn.disabled = selected.length === 0;

            var anyCheckbox = document.querySelectorAll('.category-checkbox, .feed-checkbox').length > 0;
            if (controls) controls.style.display = anyCheckbox ? 'flex' : 'none';
        }

        function confirmDelete() {
            if (confirm("Are you sure you want to delete selected feeds and categories? This will delete all posts and related data.")) {
                performDelete();
            }
        }

        function performDelete() {
            var feeds = [];
            var cats = [];
            document.querySelectorAll('.feed-checkbox:checked').forEach(function (cb) {
                feeds.push(cb.getAttribute('data-id'));
            });
            document.querySelectorAll('.category-checkbox:checked').forEach(function (cb) {
                cats.push(cb.getAttribute('data-id'));
            });

            console.log('Sending delete request:', { feed_ids: feeds, category_ids: cats });

            var btn = document.getElementById('delete_btn');
            if (btn) {
                btn.disabled = true;
                btn.innerText = "Deleting...";
            }

            fetch('/delete-feeds-categories', {
                method: 'POST',
                body: JSON.stringify({ feed_ids: feeds, category_ids: cats }),
                headers: { 'Content-Type': 'application/json' }
            })
                .then(function (response) {
                    console.log('Response status:', response.status);
                    return response.json();
                })
                .then(function (data) {
                    console.log('Response data:', data);
                    if (data.status === 'success') {
                        alert(data.message);
                        window.location.reload();
                    } else {
                        alert("Error: " + data.message);
                        updateDeleteButton();
                    }
                })
                .catch(function (err) {
                    console.error('Fetch error:', err);
                    alert("Error: " + err);
                    updateDeleteButton();
                });
        }

        window.handleCheckboxChange = handleCheckboxChange;
        // Poll for checkboxes since they are rendered by React
        var pollInterval = setInterval(function () {
            if (document.querySelectorAll('.category-checkbox, .feed-checkbox').length > 0) {
                updateDeleteButton();
            }
        }, 1000);
    </script>
    <div id="progressbar"></div>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>Clusters Topics dynamic</title>
    {% include "head-data.html" %}
</head>

<body>
    {% from 'site-header.html' import site_header with context %}

    {{ site_header(active='') }}

    <div class="page">
        <div class="flex items-center mb-4">
            <div id="help_button" class="text-xs font-bold text-on-surface-variant hover:text-primary bg-surface-container-high px-3 py-1.5 transition-all">
                <a href="#">help</a>
            </div>
        </div>
        <div id="clusters_topics_page_container">
            <div class="clusters-topics-placeholder">Loading clusters...</div>
        </div>
    </div>

    <script id="clusters-topics-data" type="application/json">{{ clusters_data|tojson }}</script>
    <script>
        (function () {
            var dataEl = document.getElementById("clusters-topics-data");
            if (dataEl) {
                try {
                    window.cluster_data = JSON.parse(dataEl.textContent || "{}");
                } catch (err) {
                    window.cluster_data = {};
                }
            }
        })();
    </script>

    <div id="progressbar"></div>
</body>

</html>

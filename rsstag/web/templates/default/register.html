<html>
<head>
<title>Cloud</title>
{%  include "head-data.html" %}
</head>
<body class="font-body selection:bg-secondary-container bg-background">
<noscript>
    <div class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6 text-center">
        <h1 class="text-2xl font-headline font-bold">Please enable javascript in your browser</h1>
    </div>
</noscript>

<!-- Main Navigation -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/10">
    <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <a href="/" class="font-headline font-extrabold text-primary text-xl tracking-tight">RSSTag</a>
        </div>
        <div class="flex items-center space-x-4">
            <a href="{{ login_url }}" class="text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors">Login</a>
        </div>
    </div>
</header>

<main class="min-h-screen flex items-center justify-center p-6 pt-32">
    <div class="max-w-md w-full space-y-8 bg-surface-container-lowest p-10 rounded-2xl border border-outline-variant/10 shadow-sm">
        <div class="text-center">
            <h2 class="text-3xl font-headline font-extrabold text-primary">Create account</h2>
            <p class="mt-2 text-sm text-on-surface-variant font-medium">Join RSSTag today</p>
        </div>

        {% for e in err %}
            <div class="bg-error-container text-on-error-container p-4 rounded-xl text-sm font-medium border border-error/10">
                {{e}}
            </div>
        {% endfor %}

        <form action="{{register_url}}" method="POST" id="register_form" class="space-y-6">
            <div class="space-y-2">
                <label for="login" class="block text-sm font-bold text-on-surface-variant">Login</label>
                <input type="text" name="login" id="login" class="w-full bg-surface-container-high border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary transition-all placeholder:text-on-surface-variant/50" placeholder="Choose a username" />
            </div>
            <div class="space-y-2">
                <label for="password" class="block text-sm font-bold text-on-surface-variant">Password</label>
                <input type="password" name="password" id="password" class="w-full bg-surface-container-high border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary transition-all placeholder:text-on-surface-variant/50" placeholder="••••••••" />
            </div>
            <div class="space-y-2">
                <label for="password_confirm" class="block text-sm font-bold text-on-surface-variant">Confirm Password</label>
                <input type="password" name="password_confirm" id="password_confirm" class="w-full bg-surface-container-high border-none rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-primary transition-all placeholder:text-on-surface-variant/50" placeholder="••••••••" />
            </div>
            
            <div class="pt-2 flex items-center justify-between">
                <input type="submit" value="Register" class="w-full bg-primary text-on-primary px-6 py-3 rounded-xl text-sm font-bold active:scale-95 transition-transform cursor-pointer" />
            </div>

            <div class="flex items-center justify-center space-x-4 text-xs font-semibold text-on-surface-variant">
                <a href="{{ login_url }}" class="hover:text-primary transition-colors">Back to login</a>
                <span>•</span>
                <a href="/" class="hover:text-primary transition-colors">Cancel</a>
            </div>
        </form>
    </div>
</main>

<div id="progressbar" class="fixed bottom-0 left-0 h-1 bg-primary transition-all duration-300"></div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Hierarchy{% if feed %} | {{ feed.title }}{% elif tag %} | {{ tag }}{% endif %}</title>
    {% include "head-data.html" %}
</head>
<body class="feed-hierarchy-page">
    <header class="feed-hierarchy-page__header">
        <a class="feed-hierarchy-page__brand" href="/">RSSTag</a>
        <div>
            <p class="feed-hierarchy-page__eyebrow">Topic hierarchy</p>
            <h1>{% if feed %}{{ feed.title }}{% elif tag %}{{ tag }}{% else %}All posts{% endif %}</h1>
        </div>
        <nav class="feed-hierarchy-page__links">
            {% if feed %}
                <a href="/canvas?feed={{ feed.feed_id|url_encode }}">Canvas view</a>
                <a href="{{ feed.local_url or ('/feed/' ~ feed.feed_id|url_encode) }}">Regular feed view</a>
            {% elif tag %}
                <a href="/tag/{{ tag|url_encode }}">Tag view</a>
            {% endif %}
        </nav>
    </header>
    <main id="feed_hierarchy" class="feed-hierarchy" tabindex="0">
        <div id="feed_hierarchy_levels" class="feed-hierarchy__levels" aria-label="Topic depth"></div>
        <div id="feed_hierarchy_tree" class="feed-hierarchy__tree" aria-label="Topics hierarchy"></div>
    </main>
    <script>window.hierarchyTopics = {{ topics_json | safe }};</script>
    <script>window.TAG_WORDS = {{ tag_words | tojson }};</script>
    <script type="module" src="/static/js/components/feed-hierarchy.js"></script>
</body>
</html>
